services:
  app:
    image: ${APP_IMAGE:?APP_IMAGE is required}
    restart: unless-stopped
    environment: &laravel_env
      APP_NAME: ${APP_NAME:-Agri-Trials}
      APP_ENV: ${APP_ENV:-production}
      APP_KEY: ${APP_KEY:?APP_KEY is required}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_URL: ${APP_URL:?APP_URL is required}
      APP_LOCALE: ${APP_LOCALE:-fr}
      APP_FALLBACK_LOCALE: ${APP_FALLBACK_LOCALE:-fr}
      CONTENT_LOCALES: ${CONTENT_LOCALES:-fr,en}
      LOG_CHANNEL: ${LOG_CHANNEL:-stack}
      LOG_STACK: ${LOG_STACK:-single}
      LOG_LEVEL: ${LOG_LEVEL:-warning}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-agritrials}
      DB_USERNAME: ${DB_USERNAME:-agri}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      SESSION_DRIVER: ${SESSION_DRIVER:-database}
      SESSION_LIFETIME: ${SESSION_LIFETIME:-120}
      SESSION_ENCRYPT: ${SESSION_ENCRYPT:-true}
      SESSION_SECURE_COOKIE: ${SESSION_SECURE_COOKIE:-true}
      SESSION_SAME_SITE: ${SESSION_SAME_SITE:-lax}
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      REDIS_CLIENT: phpredis
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      REDIS_PORT: 6379
      FILESYSTEM_DISK: ${FILESYSTEM_DISK:-media}
      MEDIA_DISK: ${MEDIA_DISK:-media}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-agriadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
      MINIO_BUCKET: ${MINIO_BUCKET:-agri-media}
      MINIO_ENDPOINT: http://minio:9000
      MAIL_MAILER: ${MAIL_MAILER:-log}
      MAIL_HOST: ${MAIL_HOST:-localhost}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_SCHEME: ${MAIL_SCHEME:-tls}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-noreply@agri-trials.local}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-Agri-Trials}
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-12}
    volumes:
      - agri-trials-storage:/var/www/html/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - internal

  nginx:
    image: ${NGINX_IMAGE:?NGINX_IMAGE is required}
    restart: unless-stopped
    depends_on:
      - app
    labels:
      traefik.enable: "true"
      traefik.docker.network: ${TRAEFIK_NETWORK:-gateway}
      traefik.http.routers.agri-trials.rule: Host(`${APP_HOST:?APP_HOST is required}`)
      traefik.http.routers.agri-trials.entrypoints: ${TRAEFIK_ENTRYPOINT:-websecure}
      traefik.http.routers.agri-trials.tls: "true"
      traefik.http.routers.agri-trials.tls.certresolver: ${TRAEFIK_CERT_RESOLVER:-letsencrypt}
      traefik.http.services.agri-trials.loadbalancer.server.port: "80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/up >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - internal
      - gateway

  worker:
    image: ${APP_IMAGE:?APP_IMAGE is required}
    restart: unless-stopped
    command: php artisan queue:work --tries=3 --timeout=90
    environment: *laravel_env
    volumes:
      - agri-trials-storage:/var/www/html/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal

  scheduler:
    image: ${APP_IMAGE:?APP_IMAGE is required}
    restart: unless-stopped
    command: php artisan schedule:work
    environment: *laravel_env
    volumes:
      - agri-trials-storage:/var/www/html/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-agritrials}
      POSTGRES_USER: ${DB_USERNAME:-agri}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - agri-trials-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - internal

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:?REDIS_PASSWORD is required}"]
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - internal

  minio:
    image: minio/minio:RELEASE.2025-07-23T15-54-02Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-agriadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    volumes:
      - agri-trials-minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 15
    networks:
      - internal

  minio-init:
    image: minio/mc:RELEASE.2025-07-21T05-28-08Z
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - mc alias set local http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}" && mc mb --ignore-existing "local/$${MINIO_BUCKET}"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-agriadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
      MINIO_BUCKET: ${MINIO_BUCKET:-agri-media}
    networks:
      - internal

volumes:
  agri-trials-db-data:
    name: agri-trials-db-data
  agri-trials-minio-data:
    name: agri-trials-minio-data
  agri-trials-storage:
    name: agri-trials-storage

networks:
  internal:
    name: agri-trials-internal
  gateway:
    external: true
    name: ${TRAEFIK_NETWORK:-gateway}
