services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: agri_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_healthy
    networks: [agri]

  web:
    image: nginx:1.27-alpine
    container_name: agri_web
    restart: unless-stopped
    ports:
      - "8016:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on: [app]
    networks: [agri]

  db:
    image: postgres:16-alpine
    container_name: agri_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-agritrials}
      POSTGRES_USER: ${DB_USERNAME:-agri}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-agri} -d ${DB_DATABASE:-agritrials}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [agri]

  redis:
    image: redis:7-alpine
    container_name: agri_redis
    restart: unless-stopped
    networks: [agri]

  minio:
    image: minio/minio:RELEASE.2025-07-23T15-54-02Z
    container_name: agri_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-agriadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-agri-minio-secret}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 15
    networks: [agri]

  minio-init:
    image: minio/mc:RELEASE.2025-07-21T05-28-08Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c", "mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD} && mc mb --ignore-existing local/$${MINIO_BUCKET}"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-agriadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-agri-minio-secret}
      MINIO_BUCKET: ${MINIO_BUCKET:-agri-media}
    networks: [agri]

  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: agri_queue
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan queue:work --tries=3 --timeout=90
    volumes:
      - ./:/var/www/html
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks: [agri]

  vite:
    image: node:22-alpine
    container_name: agri_vite
    working_dir: /var/www/html
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "5173:5173"
    volumes:
      - ./:/var/www/html
    networks: [agri]

volumes:
  db_data:
  minio_data:

networks:
  agri:
    driver: bridge
